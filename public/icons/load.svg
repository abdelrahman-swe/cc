      40% {
        fill: transparent;
      }
      70% {
        stroke-dashoffset: 0;
        fill: rgba(255, 255, 255, 0.5);
      }
      100% {
        stroke-dashoffset: 0;
        fill: white;
      }
    }

    .c-letter {
      stroke: white;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: transparent;
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: writeAndFill 2s ease-in-out infinite;
    }
  </style>

